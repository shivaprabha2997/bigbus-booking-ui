<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Booking12553</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <img src="https://st.redbus.in/Images/rdc/rdc-redbus-logo.svg">
    </div>

    <nav>
        <ul>
            <li class="active">Bus tickets</li>
            <li>Train tickets</li>
        </ul>
    </nav>

    <div class="nav-right">
        <span>Bookings</span>
        <span>Help</span>
        <span>Account</span>
    </div>

</header>


<section class="hero">

    <h1>India's No. 1 online<br>bus ticket booking site</h1>

    <div class="search-box">

        <div class="input-group">
            <label>From</label>
            <input type="text" placeholder="Enter city">
        </div>

        <div class="input-group">
            <label>To</label>
            <input type="text" placeholder="Enter destination">
        </div>

        <div class="input-group">
            <label>Date of Journey</label>
            <input type="date">
        </div>

        <button onclick="searchBus()">Search buses</button>

    </div>

</section>


<script src="js/script.js"></script>

</body>
</html>
